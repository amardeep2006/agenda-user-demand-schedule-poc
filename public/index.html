<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Dashboard | Premium Job Scheduling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #a855f7;
            --bg: #0b0f1a;
            --surface: #161b2c;
            --surface-hover: #1e2539;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --success: #10b981;
            --danger: #f43f5e;
            --glow: rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 2rem;
        }

        /* Navbar Style */
        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(11, 15, 26, 0.8);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: grid;
            place-items: center;
            box-shadow: 0 0 20px var(--glow);
        }

        /* Layout Grid */
        main {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 1.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px var(--glow);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Job List Styles */
        .job-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideUp 0.4s ease-out;
            transition: all 0.2s;
        }

        .job-card:hover {
            background: var(--surface-hover);
            transform: scale(1.01);
        }

        .job-details {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .job-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .job-prompt {
            color: var(--text-muted);
            font-size: 0.875rem;
            font-style: italic;
        }

        .job-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .job-id {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            background: var(--glow);
            color: var(--primary-light);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* Search Area */
        .search-box {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .search-box input {
            flex: 1;
        }

        .search-box button {
            width: auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        .empty-placeholder {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            border: 2px dashed var(--border);
            border-radius: 1rem;
        }

        /* Toast notifications */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 600;
        }

        #toast.visible { transform: translateY(0); }
        #toast.success { border-left: 4px solid var(--success); }
        #toast.error { border-left: 4px solid var(--danger); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon">⚡</div>
            Agenda POC
        </div>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <a href="/logs.html" target="_blank" style="font-size: 0.8rem; color: var(--primary-light); text-decoration: none; font-weight: 700; background: var(--glow); padding: 4px 12px; border-radius: 6px; border: 1px solid rgba(99, 102, 241, 0.2);">View Live Logs</a>
            <div style="font-size: 0.8rem; color: var(--text-muted);">
                v2.1.0 • Multi-Replica
            </div>
        </div>
    </nav>

    <div class="container">
        <main>
            <!-- Left: Creation -->
            <section>
                <div class="card">
                    <h2>✨ Schedule Task</h2>
                    <form id="jobForm">
                        <div class="form-group">
                            <label>Assigned User</label>
                            <input type="text" id="username" placeholder="e.g. amardeep" required>
                        </div>
                        <div class="form-group">
                            <label>Task Name</label>
                            <input type="text" id="jobName" placeholder="e.g. Analytics Sync" required>
                        </div>
                        <div class="form-group">
                            <label>Instructions (Prompt)</label>
                            <textarea id="userprompt" rows="3" placeholder="Describe the task..." required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Recurrence</label>
                            <input type="text" id="schedule" value="5 minutes" required>
                        </div>
                        <button type="submit" class="btn-primary" id="submitBtn">
                            Confirm Schedule
                        </button>
                    </form>
                </div>

                <div style="margin-top: 1.5rem; text-align: center;">
                    <a href="/dash" target="_blank" style="color: var(--text-muted); font-size: 0.75rem; text-decoration: none; border-bottom: 1px solid var(--border);">Open Agendash Monitoring →</a>
                </div>
            </section>

            <!-- Right: Listing -->
            <section>
                <div class="card" style="min-height: 500px;">
                    <h2>📋 Deployment Status</h2>
                    
                    <div class="search-box">
                        <input type="text" id="searchUser" placeholder="Search username...">
                        <button class="btn-primary" onclick="fetchJobs()">Find Jobs</button>
                    </div>

                    <div id="jobList">
                        <div class="empty-placeholder">
                            Select a user to view their active schedules
                        </div>
                    </div>

                    <div id="dangerZone" style="margin-top: 2rem; display: none; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                        <button onclick="deleteJobs()" style="background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid rgba(244, 63, 94, 0.2); width: auto; font-size: 0.8rem;">
                            Terminate All Jobs for User
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        const form = document.getElementById('jobForm');
        const jobList = document.getElementById('jobList');
        const searchInput = document.getElementById('searchUser');
        const dangerZone = document.getElementById('dangerZone');

        function showToast(msg, type = 'success') {
            toast.textContent = msg;
            toast.className = `visible ${type}`;
            setTimeout(() => toast.className = '', 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const payload = {
                username: document.getElementById('username').value,
                jobName: document.getElementById('jobName').value,
                userprompt: document.getElementById('userprompt').value,
                schedule: document.getElementById('schedule').value
            };

            try {
                const res = await fetch('/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showToast('Job deployed successfully');
                    form.reset();
                    if (searchInput.value === payload.username) fetchJobs();
                } else {
                    const err = await res.json();
                    showToast(err.error || 'Deployment failed', 'error');
                }
            } catch (e) {
                showToast('Network failure', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Confirm Schedule';
            }
        });

        async function fetchJobs() {
            const user = searchInput.value.trim();
            if (!user) return showToast('Enter a username', 'error');

            jobList.innerHTML = '<div style="text-align: center; padding: 2rem;">Querying database...</div>';
            
            try {
                const res = await fetch(`/jobs?username=${encodeURIComponent(user)}`);
                const jobs = await res.json();

                if (res.ok) {
                    if (jobs.length === 0) {
                        jobList.innerHTML = '<div class="empty-placeholder">No active schedules found for this user.</div>';
                        dangerZone.style.display = 'none';
                    } else {
                        jobList.innerHTML = jobs.map(j => `
                            <div class="job-card">
                                <div class="job-details">
                                    <div class="job-title">${j.jobName}</div>
                                    <div class="job-prompt">"${j.userprompt}"</div>
                                    <div class="job-meta">
                                        <span class="badge">Every ${j.schedule}</span>
                                        <span class="job-id">ID: ${j.jobId || 'N/A'}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                        dangerZone.style.display = 'block';
                    }
                }
            } catch (e) {
                showToast('Sync error', 'error');
            }
        }

        async function deleteJobs() {
            const user = searchInput.value.trim();
            if (!user || !confirm('Terminate all active schedules for this user?')) return;

            try {
                const res = await fetch(`/jobs?username=${encodeURIComponent(user)}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('All jobs terminated');
                    fetchJobs();
                }
            } catch (e) {
                showToast('Termination failed', 'error');
            }
        }

        searchInput.addEventListener('keypress', (e) => e.key === 'Enter' && fetchJobs());
    </script>
</body>
</html>
