<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Job Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            align-items: start;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .job-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .job-item {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 0.8rem;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.4s ease-out;
        }

        .job-info h3 {
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }

        .job-info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .badge {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .search-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            background: var(--card-bg);
            border-left: 4px solid var(--primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agenda Job Manager</h1>
            <p class="subtitle">Proof of Concept for Dynamic User Demand Scheduling</p>
        </header>

        <div class="grid">
            <!-- Create Job Section -->
            <section class="card">
                <h2>✨ Create New Job</h2>
                <form id="createJobForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="e.g. amardeep" required>
                    </div>
                    <div class="form-group">
                        <label for="jobName">Job Name</label>
                        <input type="text" id="jobName" placeholder="e.g. Weekly Report" required>
                    </div>
                    <div class="form-group">
                        <label for="userprompt">User Prompt (Instructions)</label>
                        <textarea id="userprompt" rows="3" placeholder="e.g. Generate Q3 metrics" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="schedule">Schedule (Human Readable)</label>
                        <input type="text" id="schedule" placeholder="e.g. every 5 minutes" required>
                    </div>
                    <button type="submit" class="btn-primary" id="submitBtn">
                        Create Job
                    </button>
                </form>
            </section>

            <!-- List Jobs Section -->
            <section class="card">
                <h2>📋 Manage Jobs</h2>
                <div class="search-container">
                    <input type="text" id="searchUser" placeholder="Search by username...">
                    <button class="btn-primary" style="width: auto;" onclick="fetchJobs()">Search</button>
                </div>
                
                <div id="jobResults" class="job-list">
                    <div class="empty-state">Enter a username to view scheduled jobs</div>
                </div>

                <div id="actionButtons" style="margin-top: 1.5rem; display: none;">
                    <button class="btn-danger" onclick="deleteUserJobs()">
                        Delete All Jobs for this User
                    </button>
                </div>
            </section>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const createForm = document.getElementById('createJobForm');
        const jobResults = document.getElementById('jobResults');
        const searchInput = document.getElementById('searchUser');
        const actionButtons = document.getElementById('actionButtons');
        const toast = document.getElementById('toast');

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.style.display = 'block';
            toast.style.borderLeftColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            const payload = {
                username: document.getElementById('username').value,
                jobName: document.getElementById('jobName').value,
                userprompt: document.getElementById('userprompt').value,
                schedule: document.getElementById('schedule').value
            };

            try {
                const response = await fetch('/jobs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (response.ok) {
                    showToast('Job created successfully!');
                    createForm.reset();
                    // If searching for the same user, refresh the list
                    if (searchInput.value === payload.username) {
                        fetchJobs();
                    }
                } else {
                    showToast(data.error || 'Failed to create job', 'danger');
                }
            } catch (err) {
                showToast('Network error', 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Job';
            }
        });

        async function fetchJobs() {
            const username = searchInput.value.trim();
            if (!username) {
                showToast('Please enter a username', 'danger');
                return;
            }

            jobResults.innerHTML = '<div class="empty-state">Loading...</div>';
            
            try {
                const response = await fetch(`/jobs?username=${encodeURIComponent(username)}`);
                const jobs = await response.json();

                if (response.ok) {
                    if (jobs.length === 0) {
                        jobResults.innerHTML = '<div class="empty-state">No jobs found for this user</div>';
                        actionButtons.style.display = 'none';
                    } else {
                        jobResults.innerHTML = jobs.map(job => `
                            <div class="job-item">
                                <div class="job-info">
                                    <h3>${job.jobName}</h3>
                                    <p>"${job.userprompt}"</p>
                                    <p><span class="badge">${job.schedule}</span></p>
                                </div>
                            </div>
                        `).join('');
                        actionButtons.style.display = 'block';
                    }
                } else {
                    showToast('Failed to fetch jobs', 'danger');
                }
            } catch (err) {
                showToast('Network error', 'danger');
            }
        }

        async function deleteUserJobs() {
            const username = searchInput.value.trim();
            if (!username || !confirm(`Are you sure you want to delete all jobs for "${username}"?`)) return;

            try {
                const response = await fetch(`/jobs?username=${encodeURIComponent(username)}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                if (response.ok) {
                    showToast(data.message);
                    fetchJobs();
                } else {
                    showToast('Failed to delete jobs', 'danger');
                }
            } catch (err) {
                showToast('Network error', 'danger');
            }
        }

        // Allow Enter key to trigger search
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchJobs();
        });
    </script>
</body>
</html>
